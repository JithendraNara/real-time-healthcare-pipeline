# MLflow + MinIO overlay for the ML module.
#
# Bring up with:
#   docker compose -f ml/docker-compose.ml.yml up -d
#
# Then train with:
#   MLFLOW_TRACKING_URI=http://localhost:5000 python ml/scripts/train.py --synthetic 1000 --promote
#
# MLflow UI: http://localhost:5000
# MinIO console: http://localhost:9001 (minioadmin / minioadmin)
#
# MinIO is the artifact store. SQLite is the metadata backend (file-backed, fine for local dev).

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.0
    container_name: healthcare-mlflow
    depends_on: [minio]
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root s3://mlflow/
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: healthcare-mlflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio-ml-data:/data

  mc:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/mlflow || true;
      exit 0;
      "

volumes:
  mlflow-data:
  minio-ml-data:
