# Local dev stack — zero AWS, just containers.
# Brings up: MinIO (S3), Iceberg REST (catalog), Postgres (catalog backing), and the AI analyst.
# The actual dbt transformations run against DuckDB by default — fast & no external deps.

services:
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ***
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  mc:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/raw local/silver local/gold local/warehouse || true;
      exit 0;
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    depends_on: [minio, postgres]
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: ***
      AWS_REGION: us-east-1
      AWS_S3_ENDPOINT: http://minio:9000
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      JDBC_URI: jdbc:postgresql://postgres:5432/iceberg
      JDBC_USER: iceberg
      JDBC_PASSWORD: ***
    ports:
      - "8181:8181"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: ***
      POSTGRES_DB: iceberg
    volumes:
      - iceberg-pg:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  ai-analyst:
    build: ./ai/analyst
    environment:
      DUCKDB_PATH: /app/dbt_project/dbt.duckdb
      DB_SCHEMA: main
      MINIMAX_API_KEY: "${MINIMAX_API_KEY:-}"
    volumes:
      - ./dbt_project:/app/dbt_project:ro
      - ./scripts:/app/scripts:ro
    ports:
      - "8000:8000"

volumes:
  minio-data:
  iceberg-pg:
