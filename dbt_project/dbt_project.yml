name: vital_pipeline
version: '0.2.0'
config-version: 2

# dbt Fusion engine + Apache Iceberg v3 (S3/Glue prod, DuckDB local dev)
# Healthcare data: Bronze → Silver → Gold with OMOP CDM alignment.

profile: vital_pipeline

require-dbt-version: [">=1.8.0", "<2.0.0"]

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Source schemas
  source_schema: "{{ env_var('SOURCE_SCHEMA', 'raw_dev') }}"
  warehouse_schema: "{{ env_var('WAREHOUSE_SCHEMA', 'analytics_dev') }}"

  # Iceberg namespace (prod) / DuckDB schema (local)
  iceberg_namespace: "{{ env_var('ICEBERG_NAMESPACE', 'silver_dev') }}"
  iceberg_gold_namespace: "{{ env_var('ICEBERG_GOLD_NAMESPACE', 'gold_dev') }}"

  # S3
  s3_warehouse: "{{ env_var('S3_WAREHOUSE', 's3://vital-pipeline-warehouse') }}"

  # Reference data seeds
  icd10_seed_path: seeds/icd10_codes.csv
  cpt_seed_path:   seeds/cpt_codes.csv

  # Business rules
  child_max_age: 26
  analysis_date: "2026-06-01"

# Medallion architecture — works for both Iceberg (prod) and DuckDB (local)
models:
  vital_pipeline:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
    omop:
      +materialized: table
      +schema: omop
    udfs:
      +materialized: table
      +schema: gold

on-run-start:
  - "{{ log('vital-pipeline: ' ~ this.name ~ ' starting', info=True) }}"

# Store test failures in a target schema for inspection
tests:
  +store_failures: true
  +fail_on_error: false
