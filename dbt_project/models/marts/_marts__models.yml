version: 2

# Gold-layer mart contracts
# These run as dbt tests on every build.
models:
  - name: mart_member_roster
    description: "Analytics-ready member roster with DQ flags"
    columns:
      - name: member_id
        tests:
          - unique
          - not_null
      - name: enrollment_status
        tests:
          - accepted_values:
              arguments:
                values: ['Active', 'Inactive']
      - name: age_bucket
        tests:
          - accepted_values:
              arguments:
                values: ['Minor', 'Young Adult', 'Adult', 'Middle', 'Pre-Senior', 'Senior']
      - name: plan_type
        tests:
          - accepted_values:
              arguments:
                values: ['HMO', 'PPO', 'EPO', 'HDHP', 'POS']

  - name: int_member_months
    description: "Member-month grain table for PMPM calculations"

  - name: mart_medication_adherence
    description: "Proportion of Days Covered (PDC) per patient per drug. PDC >= 0.80 is the CMS/NCQA 'adherent' threshold."
    columns:
      - name: person_id
        tests: [not_null]
      - name: drug_source_value
        tests: [not_null]
      - name: pdc_score
        tests:
          - not_null
      - name: adherence_category
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['adherent', 'partially_adherent', 'non_adherent']
      - name: fill_count
        tests: [not_null]
      - name: observation_window_days
        tests: [not_null]

  - name: mart_condition_drug_pairs
    description: "Co-occurring (condition, drug) pairs with treatment-lag analysis. Restricted to drug starts within 90 days of condition onset."
    columns:
      - name: person_id
        tests: [not_null]
      - name: condition_source_value
        tests: [not_null]
      - name: drug_source_value
        tests: [not_null]
      - name: first_condition_onset
        tests: [not_null]
      - name: first_drug_for_condition
        tests: [not_null]
      - name: days_from_onset_to_drug
        tests: [not_null]
      - name: treatment_lag_bucket
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['same_day', 'within_week', 'within_month', 'within_quarter', 'after_quarter']
      - name: drug_fills_for_condition
        tests: [not_null]
