name: vital-pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ─── Lint + test the OMOP pipeline end-to-end ───
  pipeline-test:
    name: Pipeline (dbt + DQ + AI boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ai/analyst/requirements.txt
          pip install flake8 black isort pytest pytest-cov dbt-core dbt-duckdb duckdb great-expectations pandas

      - name: Lint
        run: |
          flake8 ai/ data_quality/ scripts/ --max-line-length=120 --ignore=E501,W503
          black --check ai/ data_quality/ scripts/
          isort --check-only ai/ data_quality/ scripts/

      - name: Generate Synthea-like seed
        run: python scripts/seed_omop.py --patients 500

      - name: dbt deps
        working-directory: dbt_project
        run: dbt deps

      - name: dbt seed
        working-directory: dbt_project
        run: |
          mkdir -p ~/.dbt
          cp profiles.yml.example ~/.dbt/profiles.yml
          DBT_PROFILES_DIR=~/.dbt dbt seed --profile vital_pipeline --target local

      - name: dbt build
        working-directory: dbt_project
        run: DBT_PROFILES_DIR=~/.dbt dbt build --profile vital_pipeline --target local

      - name: Data quality (GX + OMOP + freshness)
        run: DUCKDB_PATH=dbt_project/dbt.duckdb python data_quality/run_gx_suite.py

      - name: AI analyst boot test
        run: |
          uvicorn ai.analyst.app:app --host 127.0.0.1 --port 8765 &
          sleep 4
          curl -fsS http://127.0.0.1:8765/health
          curl -fsS http://127.0.0.1:8765/schema
          kill %1 2>/dev/null || true

      - uses: codecov/codecov-action@v4
        with: file: ./coverage.xml
        continue-on-error: true

  # ─── Build and push the AI analyst container ───
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: pipeline-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./ai/analyst
          push: true
          tags: ghcr.io/${{ github.repository }}/ai-analyst:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security scan ───
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - uses: github/codeql-action/upload-sarif@v3
        with: sarif_file: 'trivy-results.sarif'

  # ─── Streaming module tests (no broker required for unit tests) ───
  streaming-test:
    name: Streaming Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r streaming/producers/requirements.txt
          pip install flake8 black isort pytest

      - name: Lint streaming
        run: |
          flake8 streaming/ --max-line-length=120 --ignore=E501,W503
          black --check streaming/
          isort --check-only streaming/

      - name: Unit tests (no broker)
        run: pytest streaming/tests/ -v --tb=short

      - name: Event shape smoke test
        run: python streaming/examples/quickstart_producer.py > /tmp/stream_sample.json
        # Sanity check: every generated event has a patient_id, event_time, source
          python -c "
import json, sys
with open('/tmp/stream_sample.json') as f:
    txt = f.read()
assert '\"patient_id\"' in txt
assert '\"event_time\"' in txt
assert '\"source\"' in txt
print('OK: smoke test produced all four event types')
"

  # ─── ML module tests (no MLflow server / Kafka / OMOP required) ───
  ml-test:
    name: ML Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: python-version: ${{ env.PYTHON_VERSION }}

      - name: Install OS deps for LightGBM
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r streaming/producers/requirements.txt
          pip install -r ml/requirements.txt
          pip install flake8 black isort pytest

      - name: Lint ML
        run: |
          flake8 ml/ --max-line-length=120 --ignore=E501,W503
          black --check ml/
          isort --check-only ml/

      - name: Unit tests (no MLflow server, no Kafka, no OMOP)
        run: pytest ml/tests/ -v --tb=short

      - name: Train a quick model on synthetic data (smoke test the full pipeline)
        run: |
          python ml/scripts/train.py --synthetic 300 --tracking-uri sqlite:///mlflow.db

      - name: Verify the model is registered
        run: |
          python -c "
import mlflow
client = mlflow.tracking.MlflowClient('sqlite:///mlflow.db')
exp = client.get_experiment_by_name('readmission_30d')
assert exp is not None, 'no readmission_30d experiment found'
versions = client.get_latest_versions('readmission_30d')
assert len(versions) >= 1, f'no registered versions: {versions}'
v = versions[0]
print(f'OK: {v.name} v{v.version} stage={v.current_stage}')
"
